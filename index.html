<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Patrick Weldon Bray - A Life Honoured</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --vintage-bg: #F9F8F4;      
      --vintage-text: #2C3531;    
      --vintage-sage: #8A9A86;    
      --vintage-gold: #C2A878;    
      --bar-bg: #2C3531;         
      --bar-text: #F9F8F4;
      --overlay-bg: rgba(0, 0, 0, 0.88);
    }
    
    body {
      margin: 0;
      padding: 0;
      background-color: var(--vintage-bg);
      font-family: 'Lora', serif;
      color: var(--vintage-text);
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Top Bar Branding - Three Column Layout */
    .top-bar {
      height: 60px;
      background: var(--bar-bg);
      color: var(--bar-text);
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0 50px;
      z-index: 4000;
    }

    .top-bar .name-brand {
      font-family: 'Playfair Display', serif;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--bar-text);
      opacity: 0.8;
    }

    .top-bar .main-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--vintage-gold);
    }

    #chapter-name {
      text-align: right;
      color: var(--bar-text);
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0.9;
    }

    /* Landing Page Overlay */
    #landing-page {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: var(--vintage-bg);
      z-index: 5000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 1s ease-out;
    }
    .landing-content {
      text-align: center;
      max-width: 1000px;
      padding: 40px;
    }
    .landing-content img {
      width: 400px;
      height: 500px;
      object-fit: contain; /* Changed to contain for headshot */
      box-shadow: 0 40px 100px rgba(0,0,0,0.2);
      border: 15px solid white;
      margin-bottom: 40px;
      background: white;
    }
    .landing-content .landing-pre {
      font-size: 1.4rem;
      margin: 0 0 10px 0;
      color: var(--vintage-sage);
      font-style: italic;
    }
    .landing-content h2 {
      font-family: 'Playfair Display', serif;
      font-size: 4rem;
      margin: 0;
      line-height: 1.1;
      color: var(--vintage-text);
      font-weight: 700;
    }
    .landing-content p {
      font-size: 1.4rem;
      margin: 15px 0 40px 0;
      color: var(--vintage-sage);
      font-style: italic;
    }
    .start-btn-hero {
      background: var(--bar-bg);
      color: var(--vintage-gold);
      border: 1px solid var(--vintage-gold);
      padding: 20px 60px;
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      text-transform: uppercase;
      letter-spacing: 4px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .start-btn-hero:hover {
      background: var(--vintage-gold);
      color: black;
      transform: translateY(-5px);
    }

    .main-stage {
      flex: 1;
      position: relative;
      background: #EFECE5; 
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .slide {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 1.5s ease-in-out;
      pointer-events: none;
    }

    .slide.active { opacity: 1; pointer-events: auto; }

    .slide.chapter-intro {
      background: var(--bar-bg);
      flex-direction: column;
      color: var(--vintage-gold);
    }
    .chapter-intro h2 {
      font-family: 'Playfair Display', serif;
      font-size: 5rem;
      margin: 0;
      text-align: center;
      border-bottom: 2px solid var(--vintage-gold);
      padding-bottom: 20px;
      width: 65%;
    }

    .visual-frame {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      padding: 40px 60px; 
      box-sizing: border-box;
      gap: 30px;
      transition: all 1s ease-in-out;
    }

    .slide.pos-right .visual-frame { padding-right: 28%; padding-left: 5%; } 
    .slide.pos-left .visual-frame { padding-left: 28%; padding-right: 5%; }

    .visual-frame img {
      max-width: 48%; 
      max-height: 94%;
      object-fit: contain; 
      box-shadow: 0 40px 100px rgba(0,0,0,0.1);
      background: white;
      padding: 12px;
      flex: 1;
      min-width: 0;
    }

    @keyframes enhanced-kenburns {
      0% { transform: scale(1); }
      100% { transform: scale(1.12) translate(0.1%, 0.1%); }
    }

    .slide.active:not(.cover-slide):not(.chapter-intro) .visual-frame img {
      animation: enhanced-kenburns 12s ease-in-out infinite alternate;
    }

    .story-overlay {
      position: absolute;
      bottom: 80px;
      width: 25%; 
      min-width: 400px;
      z-index: 3000;
      background: var(--overlay-bg); 
      color: #F4F2EE;
      padding: 40px;
      border-left: 6px solid var(--vintage-gold);
      box-shadow: 0 40px 100px rgba(0,0,0,0.5);
    }

    .slide.pos-left .story-overlay { left: 80px; }
    .slide.pos-right .story-overlay { right: 80px; }

    .photo-caption {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 0.85rem;
      color: var(--vintage-gold);
      margin-bottom: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .intro-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--vintage-gold);
      margin: 0 0 15px 0;
      line-height: 1.2;
    }

    .info-section {
      font-size: 1.15rem;
      line-height: 1.7;
      color: #E0E0E0;
    }

    /* Bottom Bar Layout */
    .bottom-bar {
      height: 60px;
      background: var(--bar-bg);
      color: var(--bar-text);
      display: flex;
      align-items: center;
      padding: 0 50px;
      gap: 20px;
      z-index: 4000;
    }

    .bottom-bar .left-group { display: flex; align-items: center; gap: 20px; flex: 1; }
    .bottom-bar .controls { display: flex; gap: 15px; }

    .btn {
      background: transparent;
      color: var(--bar-text);
      border: 1px solid var(--vintage-gold);
      padding: 8px 20px;
      font-family: 'Lora', serif;
      cursor: pointer;
      text-transform: uppercase;
      font-size: 0.75rem;
    }

    .btn:hover { background: var(--vintage-gold); color: black; }

    .progress {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      color: var(--vintage-gold);
      font-size: 0.9rem;
    }

    @media (max-width: 1300px) {
      .top-bar { grid-template-columns: 1fr 1fr; }
      .top-bar .main-title { display: none; }
      .visual-frame { padding: 20px !important; }
      .story-overlay { width: 90%; left: 5% !important; bottom: 20px; padding: 20px; min-width: 0; }
    }
  </style>
</head>
<body>

  <div id="landing-page">
    <div class="landing-content">
      <img src="cover_photo.jpg" alt="Patrick Weldon Bray">
      <p class="landing-pre">Remembering</p>
      <h2>Patrick Weldon Bray</h2>
      <p>November 17th, 1932 — April 28th, 2026</p>
      <div style="display: flex; gap: 20px; justify-content: center; margin-top: 20px;">
        <button class="start-btn-hero" onclick="startShow()">Begin Celebration</button>
        <a href="guestbook.html" class="start-btn-hero" style="text-decoration: none; display: inline-block; background: transparent; color: var(--vintage-gold);">Sign Guestbook</a>
      </div>
    </div>
  </div>

  <div class="top-bar">
    <div class="name-brand">Patrick Weldon Bray</div>
    <div class="main-title">A Celebration of Life</div>
    <div id="chapter-name">A LIFE HONOURED</div>
  </div>

  <div class="main-stage" id="stage"></div>

  <div class="bottom-bar">
    <div class="left-group">
      <button class="btn" style="background: var(--vintage-gold); color: black;" onclick="returnToCover()">Home</button>
      <div class="progress" id="counter">1 / 0</div>
    </div>
    <div class="controls">
      <button class="btn" onclick="prev()">Back</button>
      <button class="btn" id="playBtn" onclick="togglePlay()">Pause</button>
      <button class="btn" onclick="next()">Next</button>
    </div>
    <div class="controls">
      <button class="btn" onclick="window.location.href='guestbook.html'">Guestbook</button>
      <button class="btn" onclick="toggleFS()">Fullscreen</button>
    </div>
  </div>

  <script src="expanded_data.js"></script>
  <script>
    let slides = [];
    let cur = 0;
    let timer = null;
    let playing = false;

    const chapterLabels = {
      "Opening": {
        label: "A LIFE HONOURED",
        summary: "Patrick Weldon Bray, born on November 17th, 1932, passed away on April 28th, 2026. Throughout his life, he was a dedicated fisherman, carpenter, and teacher who committed himself to his community and his craft. His greatest legacy, however, remains his family; he was a brother to 8, a father of 8, a granddad to 27, and a great-granddad to 15. This is the story of 93 years lived fully, faithfully, and for his family."
      },
      "Son — parents & origins": {
        label: "A SON",
        summary: "Patrick Weldon Bray was born in Port Morien, Cape Breton, the site of North America’s first coal mine. He grew up on Peach and Breakwater Streets and was the son of "Papa" Bray. His family included eight siblings: Gerald, Art, Thomas, Mary, Carmel, Frank, Bill, and George"
      },
      "Husband — 1956 marriage": {
        label: "A HUSBAND",
        summary: "On July 17, 1956, Patrick Weldon Bray married Mary Alexandra McNeil at St. John's Church in New Aberdeen, Glace Bay. Their life together included milestones such as their 25th anniversary in 1981, their 50th in 2001, and their 65th in 2022. Documentation of their marriage features courtship photos, wedding portraits, and a celebration for Mary’s 90th birthday at Jay's Point in July 2025."
      },
      "Father — family roots": {
        label: "A FATHER",
        summary: "Pat and Mary raised 8 children — Patricia, Rick, Karen, Robert, John, Paula, Ronnie, and Sheldon. Coming up: early family photos with baby Patricia, First Communions for Ronnie and Sheldon, growing up in Glace Bay, the boys at Boularderie, the 1969 Christening gathering at 6914 Vaughan Ave in Halifax, the 1982 family reunion at Jay's Point for Papa & Grandma's 50th, summer camping, swimming in the Bras d'Or, and the family homes from New Aberdeen to Halifax."
      },
      "Granddad & Great-Grands": {
        label: "A GRANDFATHER",
        summary: "'Granddad' — one of Pat's most treasured roles. Coming up: three generations gathered including Granddad with James and Michelle, photos with granddaughters Jennifer, Monique and Monica, milestone celebrations at Jay's Point for his 85th birthday and the 50th anniversary, Samantha and Alice in a quiet moment, grandsons Liam, Stephen and Jonathan, the full gathering of grandchildren including Ryan, Ceilidh, Austin and Oliver, the great-grandchildren Geraldine and Kyle, a Cape Breton lobster feast, and the beloved Boularderie reunions."
      },
      "Retirement & Hobbies": {
        label: "A MAN OF SIMPLE JOYS",
        summary: "After retiring from NSIT in 1989, Pat filled his days with the things he loved most. Coming up: Pat 'the man' with his cat, mastering Pac Man on the Atari, and his legendary nap; fishing at the English Town Ferry Wharf; the mackerel catch; his collection of favourite hats including the famous 'Cape Breton Steak' cap; swimming at Boularderie ('Look Mary, I'm floating!'); picking cranberries; 'Biker Man' with John; the handbuilt boat 'Alexandria' on the Bras d'Or; pipe and beer at Jay's Point; retirement celebrations; and winter skating on the lake."
      },
      "The Tradesman & Builder": {
        label: "A MASTER BUILDER",
        summary: "Pat Bray was a Red Seal carpenter and the Coordinator of Trades Training at NSIT. Coming up: his craft and tools in five photographs, the construction of 57 Jay's Point cottage at Molega Lake in Spring 1979 (built entirely by his hands), the second cottage at 22 Brayside Court in Southside Boularderie, and the altars, chairs and footstools he built for St. Joachim's Church in Boularderie as an act of faith and community."
      },
      "Friendships & Community": {
        label: "A FAITHFUL FRIEND",
        summary: "Pat's life was rich in loyal friendship. Coming up: a boat ride at Jay's Point with lifelong friends Mary and Ray Wilkie, Christmas Canasta games, campfires at the cottage; a Jay's Point picnic with Anne and Don Reardon; Dad and Joe Driscoll sharing a laugh; and the beloved 'Golden Circle' gathering for the 50th anniversary — Joe Driscoll, Ray Wilkie, Pat, Mary, Dorothy McInnis and Pierce and Ellie Doyle all together."
      },
      "Pat the Leafs Fan": {
        label: "A LIFELONG FAN",
        summary: "Patrick Bray was a lifelong, unwavering Toronto Maple Leafs fan. Coming up: the 1999 pilgrimage to Maple Leaf Gardens with best friends Joe McInnis and Clary McInnis — a dream come true — and photos of the three of them cheering together inside the legendary arena. Though he never saw them win another Cup, his devotion never wavered."
      },
      "Pat’s 90th Year": {
        label: "A LIFE WELL LIVED",
        summary: "On November 17th, 2022, Patrick Weldon Bray turned 90 years old. Coming up: his birthday celebration in Halifax, reunion with lifelong friends Clary and Joe, and children and grandchildren who traveled from near and far — Paul, Andrew, Paula, Ryan, Chris, James, Angus, Stephen, John, Patricia, Jonny, Jesse, Ronnie, Karen, Gary and Sheldon — all gathered to honour the man who built this family."
      },
      "Conclusion — A Life Honoured": {
        label: "A LIFE HONOURED",
        summary: "Patrick Weldon Bray has returned to the tides of Port Morien. He leaves behind a world built on love, faith, and the steady work of his hands. His legacy will never fade from our hearts."
      }
    };

    function startShow() {
      document.getElementById('landing-page').style.opacity = '0';
      setTimeout(() => {
        document.getElementById('landing-page').style.display = 'none';
        playing = true;
        document.getElementById('playBtn').innerText = 'Pause';
        start();
        if(document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
      }, 1000);
    }

    function returnToCover() {
      stop();
      playing = false;
      document.getElementById('playBtn').innerText = 'Play';
      show(0);
      document.getElementById('landing-page').style.display = 'flex';
      setTimeout(() => {
        document.getElementById('landing-page').style.opacity = '1';
      }, 10);
      if(document.fullscreenElement) document.exitFullscreen();
    }

    async function init() {
      const resp = await fetch('patrick_bray_slideshow_workplan.html');
      const html = await resp.text();
      const doc = new DOMParser().parseFromString(html, 'text/html');
      const stage = document.getElementById('stage');
      const chapters = doc.querySelectorAll('.chapter-block');
      
      let count = 0;
      let lastChapter = null;

      chapters.forEach(ch => {
        const rawChName = ch.querySelector('.chapter-name').textContent;
        const chData = chapterLabels[rawChName] || { label: rawChName.toUpperCase(), summary: "A journey through memory and legacy." };
        
        if (rawChName !== lastChapter) {
          count++;
          const introEl = document.createElement('div');
          introEl.className = `slide chapter-intro ${count===1?'active':''}`;
          introEl.id = `s-${count-1}`;
          introEl.innerHTML = `
            <h2>${chData.label}</h2>
            <div style="max-width: 800px; text-align: center; margin-top: 40px; line-height: 1.6; font-size: 1.8rem; color: #F9F8F4; opacity: 0.9;">
              ${chData.summary}
            </div>
          `;
          stage.appendChild(introEl);
          slides.push({ ch: chData.label, type: 'intro' });
          lastChapter = rawChName;
        }

        ch.querySelectorAll('tbody tr').forEach(row => {
          const num = row.querySelector('.slide-num').textContent;
          // No longer skipping slide 2

          let title = row.querySelector('.slide-title').textContent;
          let subtitle = "Patrick Weldon Bray";
          let story = row.querySelector('.slide-content').innerHTML;

          if (window.expandedNarratives && window.expandedNarratives[num]) {
            title = window.expandedNarratives[num].title;
            subtitle = window.expandedNarratives[num].subtitle;
            story = window.expandedNarratives[num].story;
          }

          const photoCell = row.querySelector('.slide-photos');
          const matches = photoCell.innerText.match(/image\d+\.(jpg|png|jpeg)/gi);
          let allImgs = [];
          // Check for images override in expandedNarratives
          if (window.expandedNarratives && window.expandedNarratives[num] && window.expandedNarratives[num].images) {
            allImgs = window.expandedNarratives[num].images;
          } else if (matches) {
            allImgs = matches.map(m => `Timeline Photos/extracted/ppt/media/${m}`);
          }

          for (let i = 0; i < allImgs.length; i += 2) {
            count++;
            const chunk = allImgs.slice(i, i + 2);
            const posClass = count % 2 === 0 ? 'pos-left' : 'pos-right';
            const isCont = i > 0;
            
            const el = document.createElement('div');
            el.className = `slide ${posClass}`;
            el.id = `s-${count-1}`;
            
            let imgTags = chunk.map(src => `<img src="${src}">`).join('');
            if (chunk.length === 0) imgTags = `<div style="background: #222; width: 100%; height: 100%;"></div>`;

            el.innerHTML = `
              <div class="visual-frame">
                ${imgTags}
              </div>
              <div class="story-overlay">
                <div class="photo-caption">${subtitle}${isCont ? ' (continued)' : ''}</div>
                <div class="intro-title">${title}</div>
                <div class="info-section">${story}</div>
              </div>
            `;
            stage.appendChild(el);
            slides.push({ ch: chData.label, type: 'content' });
          }
        });
      });
      update();
    }

    function update() {
      document.getElementById('counter').innerText = `${cur+1} / ${slides.length}`;
      document.getElementById('chapter-name').innerText = slides[cur].ch;
    }

    function show(idx) {
      document.getElementById(`s-${cur}`).classList.remove('active');
      cur = idx;
      document.getElementById(`s-${cur}`).classList.add('active');
      update();
      if(playing) start();
    }

    function next() { show((cur+1)%slides.length); }
    function prev() { show((cur-1+slides.length)%slides.length); }
    function start() { stop(); timer = setInterval(next, 10000); }
    function stop() { clearInterval(timer); }
    function togglePlay() {
      playing = !playing;
      document.getElementById('playBtn').innerText = playing ? 'Pause' : 'Play';
      playing ? start() : stop();
    }
    function toggleFS() { document.fullscreenElement ? document.exitFullscreen() : document.documentElement.requestFullscreen(); }

    document.addEventListener('keydown', e => {
      if(e.key === 'ArrowRight' || e.key === ' ') next();
      if(e.key === 'ArrowLeft') prev();
    });

    init();
  </script>
</body>
</html>
