<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Patrick Weldon Bray - Guestbook</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --vintage-bg: #F9F8F4;      
      --vintage-text: #2C3531;    
      --vintage-sage: #8A9A86;    
      --vintage-gold: #C2A878;    
      --bar-bg: #2C3531;         
      --bar-text: #F9F8F4;
    }
    
    body {
      margin: 0;
      padding: 0;
      background-color: var(--vintage-bg);
      font-family: 'Lora', serif;
      color: var(--vintage-text);
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Top Bar Branding */
    .top-bar {
      height: 60px;
      background: var(--bar-bg);
      color: var(--bar-text);
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0 50px;
      z-index: 4000;
      flex-shrink: 0;
    }

    .top-bar .name-brand {
      font-family: 'Playfair Display', serif;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--bar-text);
      opacity: 0.8;
    }

    .top-bar .main-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--vintage-gold);
      text-align: center;
    }

    .top-bar .nav-links {
      text-align: right;
    }

    .btn-nav {
      background: transparent;
      color: var(--vintage-gold);
      border: 1px solid var(--vintage-gold);
      padding: 8px 20px;
      font-family: 'Lora', serif;
      cursor: pointer;
      text-transform: uppercase;
      font-size: 0.75rem;
      text-decoration: none;
      transition: all 0.3s;
    }

    .btn-nav:hover {
      background: var(--vintage-gold);
      color: var(--bar-bg);
    }

    /* Guestbook Container */
    .guestbook-container {
      flex: 1;
      display: flex;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
      padding: 40px;
      gap: 40px;
      overflow: hidden;
    }

    /* Left Side: Form */
    .sign-section {
      flex: 1;
      background: #fff;
      padding: 40px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.05);
      border: 1px solid var(--vintage-gold);
      display: flex;
      flex-direction: column;
      max-width: 500px;
    }

    .sign-section h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2.5rem;
      color: var(--vintage-text);
      margin: 0 0 10px 0;
    }

    .sign-section p {
      color: var(--vintage-sage);
      font-style: italic;
      margin-bottom: 30px;
      font-size: 1.1rem;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-family: 'Playfair Display', serif;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 0.8rem;
      margin-bottom: 8px;
      color: var(--vintage-text);
    }

    .form-group input, .form-group textarea {
      width: 100%;
      padding: 12px;
      font-family: 'Lora', serif;
      font-size: 1rem;
      border: 1px solid #d3d1c7;
      background: #F9F8F4;
      box-sizing: border-box;
      color: var(--vintage-text);
    }

    .form-group input:focus, .form-group textarea:focus {
      outline: none;
      border-color: var(--vintage-gold);
    }

    .form-group textarea {
      height: 120px;
      resize: none;
    }

    .form-group .file-input-wrapper {
      position: relative;
      overflow: hidden;
      display: inline-block;
      width: 100%;
    }

    .file-btn {
      border: 1px dashed var(--vintage-gold);
      color: var(--vintage-sage);
      background-color: var(--vintage-bg);
      padding: 10px;
      border-radius: 4px;
      font-size: 0.9rem;
      cursor: pointer;
      display: block;
      text-align: center;
      transition: all 0.3s;
    }

    .file-btn:hover {
      background: #eee;
    }

    .preview-img {
      max-width: 100%;
      height: auto;
      margin-top: 10px;
      border-radius: 4px;
      display: none;
    }

    .message-photo {
      width: 100%;
      max-height: 400px;
      object-fit: cover;
      border-radius: 4px;
      margin-bottom: 15px;
      cursor: pointer;
      transition: transform 0.3s;
    }

    .message-photo:hover {
      transform: scale(1.02);
    }

    .submit-btn {
      background: var(--bar-bg);
      color: var(--vintage-gold);
      border: none;
      padding: 15px;
      font-family: 'Playfair Display', serif;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
    }

    .submit-btn:hover {
      background: var(--vintage-gold);
      color: var(--bar-bg);
    }

    .status-msg {
      margin-top: 15px;
      font-style: italic;
      font-size: 0.9rem;
      color: var(--vintage-sage);
    }

    /* Right Side: Messages */
    .messages-section {
      flex: 2;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .messages-header {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      color: var(--vintage-text);
      margin-bottom: 20px;
      border-bottom: 1px solid #d3d1c7;
      padding-bottom: 10px;
    }

    .messages-list {
      flex: 1;
      overflow-y: auto;
      padding-right: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* Custom Scrollbar */
    .messages-list::-webkit-scrollbar { width: 6px; }
    .messages-list::-webkit-scrollbar-track { background: transparent; }
    .messages-list::-webkit-scrollbar-thumb { background: var(--vintage-gold); border-radius: 3px; }

    .message-card {
      background: #fff;
      padding: 30px;
      border-left: 4px solid var(--vintage-gold);
      box-shadow: 0 10px 20px rgba(0,0,0,0.03);
    }

    .message-text {
      font-size: 1.15rem;
      line-height: 1.6;
      color: var(--vintage-text);
      margin-bottom: 15px;
      white-space: pre-wrap;
    }

    .message-author {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--bar-bg);
    }

    .message-meta {
      font-size: 0.85rem;
      color: var(--vintage-sage);
      font-style: italic;
      margin-top: 4px;
    }

    .empty-state {
      text-align: center;
      color: var(--vintage-sage);
      font-style: italic;
      margin-top: 40px;
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <div class="name-brand">Patrick Weldon Bray</div>
    <div class="main-title">A Celebration of Life</div>
    <div class="nav-links">
      <a href="index.html" class="btn-nav">Return to Presentation</a>
    </div>
  </div>

  <div class="guestbook-container">
    
    <!-- Left: Sign Form -->
    <div class="sign-section">
      <h2>Guestbook</h2>
      <p>Please share a memory or leave a message for the family.</p>
      
      <div class="form-group">
        <label>Your Name</label>
        <input type="text" id="gb-name" placeholder="e.g. John Doe" required>
      </div>
      
      <div class="form-group">
        <label>Relationship (Optional)</label>
        <input type="text" id="gb-relation" placeholder="e.g. Friend, Cousin, Colleague">
      </div>
      
      <div class="form-group">
        <label>Message</label>
        <textarea id="gb-message" placeholder="Share your memory here..." required></textarea>
      </div>

      <div class="form-group">
        <label>Attach a Photo (Optional)</label>
        <div class="file-input-wrapper">
          <input type="file" id="gb-photo" accept="image/*" capture="environment" style="display: none;" onchange="previewImage(this)">
          <div class="file-btn" onclick="document.getElementById('gb-photo').click()">📸 Take a Photo or Select from Gallery</div>
        </div>
        <img id="image-preview" class="preview-img">
      </div>
      
      <button class="submit-btn" onclick="submitMessage()">Sign Guestbook</button>
      <div id="status-msg" class="status-msg"></div>
    </div>

    <!-- Right: Read Messages -->
    <div class="messages-section">
      <div class="messages-header">Shared Memories</div>
      <div class="messages-list" id="messages-list">
        <div class="empty-state">Loading messages...</div>
      </div>
    </div>

  </div>

  <script>
    // --- SUPABASE CONFIGURATION ---
    const SUPABASE_URL = 'https://rzkprbhipdpqiyhyqotw.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_1r-ewd8PTiJuwymgHl4wHg_zpQTUT4M';
    
    // Initialize Supabase only if keys are provided
    let supabaseClient = null;
    if (SUPABASE_URL && SUPABASE_URL.indexOf('supabase.co') !== -1) {
      // Use the global 'supabase' object from the CDN to create a client
      supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      fetchMessages();
    } else {
      document.getElementById('messages-list').innerHTML = `<div class="empty-state">Waiting for database connection...</div>`;
    }

    async function fetchMessages() {
      if (!supabaseClient) return;
      
      const { data, error } = await supabaseClient
        .from('guestbook')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) {
        console.error('Error fetching messages:', error);
        if (error.message.includes("not found")) {
            document.getElementById('messages-list').innerHTML = `<div class="empty-state">The 'guestbook' table needs to be created in Supabase.</div>`;
        }
        return;
      }

      renderMessages(data);
    }

    function previewImage(input) {
      const preview = document.getElementById('image-preview');
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
          preview.src = e.target.result;
          preview.style.display = 'block';
        }
        reader.readAsDataURL(input.files[0]);
      } else {
        preview.src = '';
        preview.style.display = 'none';
      }
    }

    function renderMessages(messages) {
      const list = document.getElementById('messages-list');
      list.innerHTML = '';

      if (!messages || messages.length === 0) {
        list.innerHTML = `<div class="empty-state">Be the first to leave a memory.</div>`;
        return;
      }

      messages.forEach(msg => {
        const date = new Date(msg.created_at).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
        
        const card = document.createElement('div');
        card.className = 'message-card';
        
        let photoHTML = '';
        if (msg.photo_url) {
          photoHTML = `<img src="${msg.photo_url}" class="message-photo" onclick="window.open('${msg.photo_url}', '_blank')">`;
        }

        card.innerHTML = `
          ${photoHTML}
          <div class="message-text">${escapeHTML(msg.message)}</div>
          <div class="message-author">${escapeHTML(msg.name)}</div>
          <div class="message-meta">${msg.relationship ? escapeHTML(msg.relationship) + ' • ' : ''}${date}</div>
        `;
        list.appendChild(card);
      });
    }

    async function submitMessage() {
      if (!supabaseClient) {
        alert("Database is not connected yet.");
        return;
      }

      const name = document.getElementById('gb-name').value.trim();
      const relation = document.getElementById('gb-relation').value.trim();
      const message = document.getElementById('gb-message').value.trim();
      const photoFile = document.getElementById('gb-photo').files[0];
      const statusEl = document.getElementById('status-msg');

      if (!name || !message) {
        statusEl.innerText = "Please provide your name and a message.";
        statusEl.style.color = "red";
        return;
      }

      statusEl.innerText = "Submitting...";
      statusEl.style.color = "var(--vintage-sage)";

      let photoUrl = null;
      if (photoFile) {
        const fileExt = photoFile.name.split('.').pop();
        const fileName = `${Math.random()}.${fileExt}`;
        const filePath = `uploads/${fileName}`;

        const { error: uploadError, data: uploadData } = await supabaseClient.storage
          .from('guestbook-photos')
          .upload(filePath, photoFile);

        if (uploadError) {
          console.error("Upload error:", uploadError);
          statusEl.innerText = "Error uploading photo. Make sure the 'guestbook-photos' bucket exists.";
          statusEl.style.color = "red";
          return;
        }

        const { data: publicData } = supabaseClient.storage
          .from('guestbook-photos')
          .getPublicUrl(filePath);
        
        photoUrl = publicData.publicUrl;
      }

      const { error } = await supabaseClient
        .from('guestbook')
        .insert([{ name: name, relationship: relation, message: message, photo_url: photoUrl }]);

      if (error) {
        console.error("Error inserting message:", error);
        statusEl.innerText = "An error occurred. Check if the 'photo_url' column exists.";
        statusEl.style.color = "red";
      } else {
        statusEl.innerText = "Thank you! Your memory has been added.";
        statusEl.style.color = "green";
        
        // Clear form
        document.getElementById('gb-name').value = '';
        document.getElementById('gb-relation').value = '';
        document.getElementById('gb-message').value = '';
        document.getElementById('gb-photo').value = '';
        document.getElementById('image-preview').style.display = 'none';
        
        // Refresh messages
        fetchMessages();
      }
    }

    // Helper to prevent XSS
    function escapeHTML(str) {
      return str.replace(/[&<>'"]/g, 
        tag => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            "'": '&#39;',
            '"': '&quot;'
        }[tag] || tag)
      );
    }
  </script>
</body>
</html>
